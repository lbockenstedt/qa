<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Manager QA Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-entry { font-family: 'Courier New', Courier, monospace; }
        .status-PASS { color: #10b981; }
        .status-FAIL { color: #ef4444; }
        .status-CRASH { color: #f59e0b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">QA Auditor <span class="text-blue-500">Ghost Tenant</span></h1>
                <p class="text-slate-400">End-to-End Infrastructure Validation</p>
            </div>
            <div id="system-status" class="px-4 py-2 rounded-full bg-slate-800 border border-slate-600 text-sm font-medium">
                Status: <span id="status-text" class="text-blue-400">IDLE</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column: Progress & Results -->
            <div class="lg:col-span-1 space-y-6">
                <section class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-xl">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <span class="mr-2">🎯</span> Current Step
                    </h2>
                    <div id="current-step" class="text-xl font-mono text-blue-300 truncate">
                        Waiting for start...
                    </div>
                </section>

                <section class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-xl">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <span class="mr-2">📋</span> Test Results
                    </h2>
                    <div id="results-list" class="space-y-2 max-h-[500px] overflow-y-auto pr-2">
                        <p class="text-slate-500 italic text-sm">No tests run yet...</p>
                    </div>
                </section>
            </div>

            <!-- Right Column: Real-time Logs -->
            <div class="lg:col-span-2">
                <section class="bg-black p-4 rounded-lg border border-slate-700 shadow-2xl h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold flex items-center">
                            <span class="mr-2">⚡</span> Live Execution Log
                        </h2>
                        <button onclick="clearLogs()" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded transition">Clear Logs</button>
                    </div>
                    <div id="log-container" class="log-entry text-sm space-y-1 overflow-y-auto h-[600px] p-2 bg-slate-950 rounded border border-slate-800">
                        <div class="text-slate-500">[System] Auditor ready. Awaiting test trigger...</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        async function updateUI() {
            try {
                const statusRes = await fetch('/api/status');
                const status = await statusRes.json();

                document.getElementById('status-text').innerText = status.status;
                document.getElementById('current-step').innerText = status.current_step;

                const resultsList = document.getElementById('results-list');
                if (status.results && status.results.length > 0) {
                    resultsList.innerHTML = status.results.map(r => `
                        <div class="flex justify-between items-center p-2 bg-slate-700 rounded text-sm font-mono">
                            <span class="truncate">${r.name}</span>
                            <span class="status-${r.status} font-bold">${r.status}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error("UI Update Error:", e);
            }
        }

        async function pollLogs() {
            try {
                const logRes = await fetch('/api/logs');
                const logs = await logRes.json();
                const container = document.getElementById('log-container');

                container.innerHTML = logs.map(l => {
                    let color = "text-slate-300";
                    if (l.level === "SUCCESS") color = "text-emerald-400";
                    if (l.level === "ERROR") color = "text-red-400";
                    return `<div class="${color}"><span class="text-slate-600">[${new Date().toLocaleTimeString()}]</span> ${l.message}</div>`;
                }).join('');

                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error("Log Poll Error:", e);
            }
        }

        function clearLogs() {
            document.getElementById('log-container').innerHTML = '<div class="text-slate-500">[System] Logs cleared.</div>';
        }

        setInterval(updateUI, 1000);
        setInterval(pollLogs, 500);
    </script>
</body>
</html>
